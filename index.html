<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Ardsan Co-op Dashboard" />
  <title>Cooperative Dashboard</title>
  <link rel="icon" type="image/jpeg" href="Ardsan.jpeg">

  <link rel="stylesheet" href="style.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <!-- Supabase JS Client & Shared Logic -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
  <script src="shared.js"></script>
</head>

<body>

  <div class="app">

    <!-- HEADER -->
    <div class="header">
      <div class="top-icons">
        <button id="home-eye-toggle" class="icon" type="button" aria-label="Toggle balance visibility">
          <i class="fa-solid fa-eye"></i>
        </button>

        <div class="profile">
          <a href="edit.html" style="display:inline-block; border-radius:50%;">
            <div class="text-avatar" id="navProfilePic"></div>
            <img src="" alt="profile" id="navProfileImg" style="display: none;" />
          </a>
        </div>
      </div>

      <div class="user-name" id="userName">Loading...</div>

      <div class="balance">
        <span class="currency">NGN</span>
        <span class="amount" id="home-balance-value">0.00</span>
      </div>
      <div class="balance-label">Total Balance</div>
    </div>


    <!-- CARDS -->
    <div class="cards">

      <a href="savings.html" class="card">
        <div class="card-left">
          <div class="icon-box orange">
            <i class="fa-solid fa-building-columns"></i>
          </div>
          <span>My Savings</span>
        </div>
        <div class="card-right text-green" id="dashboard-savings">₦0.00</div>
      </a>

      <a href="request-loan.html" class="card">
        <div class="card-left">
          <div class="icon-box green-bg">
            <i class="fa-solid fa-money-bill-wave"></i>
          </div>
          <span>My Loans</span>
        </div>
        <div class="card-right text-red" id="dashboard-loans">₦0.00</div>
      </a>

      <a href="shop.html" class="card">
        <div class="card-left">
          <div class="icon-box red-bg">
            <i class="fa-solid fa-cart-shopping"></i>
          </div>
          <span>My Purchases</span>
        </div>
        <div class="card-right text-green" id="dashboard-purchases">₦0.00</div>
      </a>

      <a href="investment.html" class="card">
        <div class="card-left">
          <div class="icon-box blue-bg">
            <i class="fa-solid fa-chart-pie"></i>
          </div>
          <span>My Investment</span>
        </div>
        <div class="card-right text-green" id="dashboard-shares">₦0.00</div>
      </a>

    </div>
  </div>

</body>

</html>
