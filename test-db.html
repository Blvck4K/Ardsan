<!DOCTYPE html>
<html>

<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
    <script src="shared.js"></script>
</head>

<body>
    <script>
        async function runTest() {
            try {
                const { data, error } = await supabase.from('deposit_requests').select('*');
                console.log("TEST RESULT:", { data, error });
                if (error) {
                    document.body.innerHTML += `<div style="color:red">Error: ${error.message} (Code: ${error.code})</div>`;
                } else {
                    document.body.innerHTML += `<div style="color:green">Success! Data count: ${data.length}</div>`;
                }
            } catch (err) {
                document.body.innerHTML += `<div style="color:red">Catch Error: ${err.message}</div>`;
            }
        }

        // Wait for shared.js to init supabase
        setTimeout(runTest, 1000);
    </script>
</body>

</html>
