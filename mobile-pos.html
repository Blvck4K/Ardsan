<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobile POS - Deposit</title>
    <link rel="icon" type="image/jpeg" href="Ardsan.jpeg" />

    <link rel="stylesheet" href="style.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
    <script src="shared.js"></script>
</head>

<body>

    <div class="app">
        <!-- Header/Back -->
        <a href="javascript:history.back()" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Back
        </a>

        <!-- Payment Section -->
        <div class="payment-container">
            <h2>Make a Deposit</h2>
            <form id="paymentForm">
                <label for="amount">Enter Amount (₦)</label>
                <input type="number" id="amount" placeholder="e.g. 5000" required min="100" />
                <button type="submit">Pay Now</button>
            </form>
        </div>
    </div>

    <script>
        const paymentForm = document.getElementById("paymentForm");
        paymentForm.addEventListener("submit", async function (e) {
            e.preventDefault();
            const amount = document.getElementById("amount").value;
            if (!amount || amount <= 0) {
                alert("Please enter a valid amount");
                return;
            }

            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                alert("You must be logged in to deposit.");
                return;
            }

            window.location.href = `manual-payment.html?type=deposit&amount=${amount}`;
        });
    </script>

</body>

</html>
