<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Contribution - Ardsan Co-op</title>
    <link rel="icon" type="image/jpeg" href="Ardsan.jpeg" />

    <link rel="stylesheet" href="style.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
    <script src="shared.js"></script>
</head>

<body>

    <div class="app">
        <!-- Header/Back -->
        <a href="contribution.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Back to Contribution
        </a>

        <!-- Payment Section -->
        <div class="payment-container" style="margin-top: 20px;">
            <h2><i class="fa-solid fa-hand-holding-dollar" style="color: #6f42c1;"></i> Make a Contribution</h2>
            <p style="color: #666; font-size: 0.9em; margin-bottom: 15px;">Deposit secure funds directly into your
                cooperative contributions.</p>
            <form id="contributionForm">
                <label for="amount">Top-Up Amount (₦)</label>
                <input type="number" id="amount" placeholder="e.g. 5000" required min="500" />
                <button type="submit" style="background-color: #6f42c1;">Contribute Now</button>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById("contributionForm");
        form.addEventListener("submit", async function (e) {
            e.preventDefault();
            const amount = document.getElementById("amount").value;
            if (!amount || amount <= 0) {
                alert("Please enter a valid amount");
                return;
            }

            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                alert("You must be logged in to contribute.");
                return;
            }

            window.location.href = `manual-payment.html?type=contribution&amount=${amount}`;
        });
    </script>
</body>

</html>
