<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IPPIS - Ardsan Co-op</title>
    <link rel="icon" type="image/jpeg" href="Ardsan.jpeg" />

    <link rel="stylesheet" href="style.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
    <script src="shared.js"></script>
</head>

<body>

    <div class="app">
        <!-- Header -->
        <div class="header">
            <h1 style="color: #fff;">IPPIS Records</h1>
        </div>

        <!-- IPPIS Application Form -->
        <div class="withdrawal-container" style="margin-top: 20px;">
            <h2>Manage IPPIS Records</h2>
            <form id="ippisForm">
                <label for="staffId">Staff ID</label>
                <input type="text" id="staffId" required />

                <label for="ippisNumber">IPPIS Number</label>
                <input type="text" id="ippisNumber" required />

                <label for="firstName">First Name</label>
                <input type="text" id="firstName" required />

                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" required />

                <label for="department">Department</label>
                <input type="text" id="department" required />

                <label for="position">Position</label>
                <input type="text" id="position" required />

                <label for="gradeLevel">Grade Level</label>
                <input type="text" id="gradeLevel" required />

                <label for="step">Step</label>
                <input type="text" id="step" required />

                <label for="bankName">Bank Name</label>
                <input type="text" id="bankName" required />

                <label for="accountNumber">Account Number</label>
                <input type="text" id="accountNumber" required />

                <label for="payMonth">Pay Month</label>
                <input type="month" id="payMonth" required />

                <div style="margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.05); border-radius: 8px;">
                    <p style="margin: 0; font-weight: bold; font-size: 16px;">Gross Salary: ₦<span
                            id="displayGrossSalary">0.00</span></p>
                    <p style="margin: 5px 0 0; font-weight: bold; font-size: 16px; color: #28a745;">Net Salary: ₦<span
                            id="displayNetSalary">0.00</span></p>
                </div>

                <button type="submit" id="submitBtn">Save Record</button>
            </form>
        </div>
    </div>

    <!-- IPPIS Module Script -->
    <script src="js/ippis.js"></script>
</body>

</html>
