<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Withdraw Funds - Ardsan Co-op</title>
    <link rel="icon" type="image/jpeg" href="Ardsan.jpeg" />

    <link rel="stylesheet" href="style.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
    <script src="shared.js"></script>
</head>

<body>

    <div class="app">
        <!-- Header/Back -->
        <a href="javascript:history.back()" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Back
        </a>

        <!-- Withdrawal Section -->
        <div class="withdrawal-container">
            <h2>Withdraw Funds</h2>

            <form>
                <label for="amount">Withdrawal Amount (₦)</label>
                <input type="number" id="amount" placeholder="e.g. 10000" min="500" required />

                <label for="bank">Select Bank</label>
                <select id="bank" required>
                    <option value="">Choose Bank</option>
                    <option>Access Bank</option>
                    <option>GTBank</option>
                    <option>First Bank</option>
                    <option>UBA</option>
                    <option>Zenith Bank</option>
                </select>

                <label for="account">Account Number</label>
                <input type="tel" id="account" placeholder="10-digit account number" maxlength="10" required />

                <button type="submit">Withdraw</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const withdrawForm = document.querySelector('.withdrawal-container form');
            withdrawForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const amount = parseFloat(document.getElementById('amount').value);
                const bank = document.getElementById('bank').value;
                const account = document.getElementById('account').value;

                if (!amount || amount <= 0) return alert('Enter a valid amount.');
                if (!bank) return alert('Select a bank.');
                if (!account || account.length !== 10) return alert('Enter a valid 10-digit account number.');

                const { data: { user } } = await supabase.auth.getUser();
                if (!user) return alert('You must be logged in to withdraw.');

                const submitBtn = withdrawForm.querySelector('button');
                submitBtn.textContent = 'Processing...';
                submitBtn.disabled = true;

                try {
                    // Check if they have enough balance
                    const { data, error } = await supabase
                        .from('users')
                        .select('balance')
                        .eq('email', user.email)
                        .single();

                    if (error) throw error;
                    if (data.balance < amount) {
                        throw new Error("Insufficient Balance. You only have ₦" + data.balance);
                    }

                    // Deduct
                    const { error: rpcError } = await supabase.rpc('deduct_funds', {
                        user_email_param: user.email,
                        amount_param: amount
                    });
                    if (rpcError) throw rpcError;

                    // Log it
                    const { error: txError } = await supabase.from('transactions').insert([{
                        user_email: user.email,
                        type: 'withdrawal',
                        amount: amount,
                        reference: 'WTD_' + Math.floor(Math.random() * 1000000000),
                        status: 'completed'
                    }]);
                    if (txError) throw txError;

                    alert(`Withdrawal of ₦${amount} to ${bank} (${account}) was successful!`);
                    window.location.href = 'index.html';

                } catch (err) {
                    alert(err.message);
                } finally {
                    submitBtn.textContent = 'Withdraw';
                    submitBtn.disabled = false;
                }
            });
        });
    </script>
</body>

</html>
